services:
  auth-service:
    build:
      context: ./.
      target: dev # production or dev
    container_name: auth-service
    image: auth-service:local
    environment:
      - PORT=3333
      - HOST=${HOST:?}
      - LOG_LEVEL=${LOG_LEVEL:?}
      - APP_KEY=${APP_KEY:?}
      - APP_URL=${APP_URL:?}
      - SESSION_DRIVER=${SESSION_DRIVER:?}
      - DB_HOST=${DB_HOST:?}
      - DB_PORT=${DB_PORT:?}
      - DB_USER=${DB_USER:?}
      - DB_PASSWORD=${DB_PASSWORD:?}
      - DB_DATABASE=${DB_DATABASE:?}
      - OAUTH_GOOGLE_CLIENT_ID=${OAUTH_GOOGLE_CLIENT_ID:?}
      - OAUTH_GOOGLE_CLIENT_SECRET=${OAUTH_GOOGLE_CLIENT_SECRET:?}
      - OAUTH_GITHUB_CLIENT_ID=${OAUTH_GITHUB_CLIENT_ID:?}
      - OAUTH_GITHUB_CLIENT_SECRET=${OAUTH_GITHUB_CLIENT_SECRET:?}
      # - OAUTH_42LYON_CLIENT_ID=${OAUTH_42LYON_CLIENT_ID:?}
      # - OAUTH_42LYON_CLIENT_SECRET=${OAUTH_42LYON_CLIENT_SECRET:?}
    # volumes:
    # - ./auth-service:/app
    # - /app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '3333:3333'
    networks:
      - public-network
      - auth-backend
      - api-network
    restart: always

  postgres:
    image: postgres:18.4-alpine3.23
    container_name: auth-db
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE}
    # ports:
    #   - "5432:5432" #TODO : Expose port only in dev mode, not in production
    networks:
      - auth-backend
    volumes:
      - deployments-db-data:/var/lib/postgresql/18/docker
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${DB_USER} -d ${DB_DATABASE}']
      interval: 5s
      timeout: 5s
      retries: 10
    restart: always

networks:
  auth-backend:
    driver: bridge
    internal: true
  api-network:
    external: true
  public-network:
    external: true

volumes:
  deployments-db-data:
